<!DOCTYPE html>
<html lang="en">
<head>

  <!-- Load EVERYTHING from jsDelivr -->
  <base href="https://cdn.jsdelivr.net/gh/Sharkii14/sharkii-games@main/BindingIsaacLamb/">

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Flash Loader</title>

  <link rel="icon" type="image/x-icon" href="logo.jpg">
  <link rel="shortcut icon" type="image/x-icon" href="logo.jpg">

  <!-- Prevent scrolling inside iframe -->
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background-color: black;
    }

    #ruffle {
      width: 100%;
      height: 100%;
    }

    ruffle-player {
      width: 100% !important;
      height: 100% !important;
    }
  </style>

</head>

<body>

  <div id="ruffle"></div>

  <!-- Ruffle CDN -->
  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

  <script>
    window.RufflePlayer = window.RufflePlayer || {};

    window.addEventListener("load", () => {
      const ruffle = window.RufflePlayer.newest();
      const player = ruffle.createPlayer();

      const container = document.getElementById("ruffle");
      container.appendChild(player);

      // Loads from your GitHub CDN because of <base>
      player.load("game.swf");
    });
  </script>

</body>
</html>
